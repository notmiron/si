<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina non trovata – Control Garage</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .error-container { max-width: 480px; }
    .error-code {
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.05em;
      opacity: 0.15;
      margin-bottom: -1rem;
    }
    .error-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .error-text {
      color: #999;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.75rem 2rem;
      background: #fff;
      color: #0a0a0a;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .error-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,255,255,0.1);
    }
    .error-link svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="error-container">
    <p class="error-code">404</p>
    <h1 class="error-title">Pagina non trovata</h1>
    <p class="error-text">La pagina che cerchi non esiste o e' stata spostata. Torna alla homepage per trovare quello che ti serve.</p>
    <a href="/" class="error-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Torna alla Homepage
    </a>
  </div>
</body>
</html>
