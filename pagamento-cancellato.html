<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Annullato – Control Garage</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(245,158,11,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg { width: 40px; height: 40px; }
    .title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .text {
      color: #999;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.75rem 2rem;
      background: #fff;
      color: #0a0a0a;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 9999px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .link:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,255,255,0.15); }
    .contact {
      margin-top: 1.5rem;
      color: #666;
      font-size: 0.85rem;
    }
    .contact a { color: #999; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <h1 class="title">Pagamento Annullato</h1>
    <p class="text">
      Il pagamento non è stato completato.<br>
      Se hai bisogno di assistenza o vuoi riprovare, contattaci.
    </p>
    <a href="/" class="link">Torna al sito</a>
    <p class="contact">Hai problemi? Chiamaci al <a href="tel:+393889229893">388 922 9893</a></p>
  </div>
</body>
</html>
